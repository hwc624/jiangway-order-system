function getNo(){const n=parseInt(localStorage.getItem("jw_no")||"0")+1;localStorage.setItem("jw_no",n);return String(n).padStart(4,"0");}

function getDates(){const d=[],now=new Date(),cur=new Date(now);while(d.length<14){if(cur.getDay()!==6)d.push(new Date(cur));cur.setDate(cur.getDate()+1);}return d;}
const fmtDate=d=>d.toLocaleDateString("zh-TW",{month:"short",day:"numeric",weekday:"short"});
const fmtKey=d=>d.toISOString().split("T")[0];
const isToday=d=>fmtKey(d)===fmtKey(new Date());
function getSlots(dt){
  const now=new Date(),day=dt.getDay(),end=day===0?14:19,slots=[],td=isToday(dt);
  if(td)slots.push("盡快 ASAP");
  for(let h=10;h<=end;h++)for(const m of[0,15,30,45]){
    if(h===10&&m<30)continue;if(h===end&&m>0)continue;
    if(td){const sd=new Date(now);sd.setHours(h,m,0,0);if(sd<=new Date(now.getTime()+600000))continue;}
    slots.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
  }
  return slots;
}
function calcPromo(items,qty,promos){
  let disc=0;const discLines=[],addonList=[];
  const sub=items.reduce((s,i)=>s+i.price*qty(i.id),0);
  promos.filter(p=>p.active).forEach(p=>{
    if(p.type==="order_discount"){const d=Math.round(sub*(p.pct/100));disc+=d;discLines.push(`🎉 ${p.label}：-R${d}`);}
    if(p.type==="item_discount"){items.filter(i=>i.id===p.itemId).forEach(i=>{const d=Math.round(i.price*qty(i.id)*(p.pct/100));disc+=d;discLines.push(`🎉 ${p.label}：-R${d}`);});}
    if(p.type==="addon")addonList.push(p);
  });
  return{disc,discLines,addonList};
}

function AnalyticsTab({orders,BORDER,RED,NAVY,DARK}){
  const [aFilter,setAFilter]=useState("item");
  const [aDate,setADate]=useState("");
  const [aSort,setASort]=useState("rev");

  const filtered=orders.filter(o=>{
    if(aDate){
      const oDate=o.ts?o.ts.split(" ")[0]:"";
      if(oDate!==aDate)return false;
    }
    return true;
  });

  // 總覽
  const totalRev=filtered.reduce((s,o)=>s+o.total,0);
  const totalOrders=filtered.length;
  const avgOrder=totalOrders>0?Math.round(totalRev/totalOrders):0;

  // 品項分析
  const itemMap={};
  filtered.forEach(o=>{
    if(o.items){
      o.items.forEach(i=>{
        if(!itemMap[i.name])itemMap[i.name]={name:i.name,qty:0,rev:0};
        itemMap[i.name].qty+=i.qty;
        itemMap[i.name].rev+=i.price*i.qty;
      });
    }
  });
  const itemList=Object.values(itemMap).sort((a,b)=>aSort==="qty"?b.qty-a.qty:b.rev-a.rev);

  // 客戶分析
  const custMap={};
  filtered.forEach(o=>{
    const k=o.name||"未知";
    if(!custMap[k])custMap[k]={name:k,orders:0,total:0};
    custMap[k].orders+=1;
    custMap[k].total+=o.total;
  });
  const custList=Object.values(custMap).sort((a,b)=>b.total-a.total);

  // 每日分析
  const dayMap={};
  filtered.forEach(o=>{
    const d=o.ts?o.ts.split(" ")[0]:"未知";
    if(!dayMap[d])dayMap[d]={date:d,orders:0,total:0};
    dayMap[d].orders+=1;
    dayMap[d].total+=o.total;
  });
  const dayList=Object.values(dayMap).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const Card=({label,val,sub})=>(
    <div style={{flex:1,background:"#fff",borderRadius:10,padding:"14px 12px",border:`1px solid ${BORDER}`,textAlign:"center"}}>
      <div style={{fontSize:11,color:"#888",marginBottom:4}}>{label}</div>
      <div style={{fontSize:20,fontWeight:500,color:NAVY}}>{val}</div>
      {sub&&<div style={{fontSize:11,color:"#aaa",marginTop:2}}>{sub}</div>}
    </div>
  );

  return(
    <div>
      <div style={{fontSize:14,fontWeight:500,color:NAVY,marginBottom:12}}>📊 銷售分析 Sales Analytics</div>

      {/* 日期篩選 */}
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
        <div style={{fontSize:12,color:"#777",flexShrink:0}}>篩選日期</div>
        <input type="date" value={aDate} onChange={e=>setADate(e.target.value)} style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,fontSize:13,background:"#fff",color:DARK}}/>
        {aDate&&<button onClick={()=>setADate("")} style={{padding:"8px 12px",borderRadius:8,border:`1.5px solid ${BORDER}`,background:"#fff",color:"#888",fontSize:12,cursor:"pointer"}}>清除</button>}
      </div>

      {/* 總覽卡片 */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <Card label="總營業額 Revenue" val={`R${totalRev}`}/>
        <Card label="訂單數 Orders" val={totalOrders}/>
        <Card label="平均客單 Avg" val={`R${avgOrder}`}/>
      </div>

      {/* 分頁切換 */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["item","品項"],["customer","客戶"],["day","每日"]].map(([k,l])=>(
          <button key={k} onClick={()=>setAFilter(k)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:`1.5px solid ${aFilter===k?NAVY:BORDER}`,background:aFilter===k?NAVY:"#fff",color:aFilter===k?"#fff":DARK,fontSize:12,fontWeight:aFilter===k?500:400,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {/* 品項分析 */}
      {aFilter==="item"&&<div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:500,color:NAVY}}>🔥 熱銷品項 Top Items</div>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setASort("rev")} style={{padding:"4px 10px",borderRadius:6,border:`1.5px solid ${aSort==="rev"?RED:BORDER}`,background:aSort==="rev"?"#FDF0EE":"#fff",color:aSort==="rev"?RED:"#888",fontSize:11,cursor:"pointer"}}>金額</button>

          return(
            <div key={item.name} style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:6,border:`1px solid ${BORDER}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

                  <span style={{fontSize:13,fontWeight:500,color:DARK}}>{item.name}</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:500,color:RED}}>R{item.rev}</div>
                  <div style={{fontSize:11,color:"#888"}}>{item.qty} 份</div>
                </div>
              </div>

                <div style={{height:4,background:RED,borderRadius:2,width:`${pct}%`,transition:"width 0.3s"}}/>

      {/* 客戶分析 */}
      {aFilter==="customer"&&<div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:500,color:NAVY,marginBottom:8}}>👥 客戶分析 Customers</div>
        {custList.length===0&&<div style={{textAlign:"center",color:"#aaa",fontSize:13,padding:"20px 0"}}>📭 暫無資料</div>}

          <div key={c.name} style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:6,border:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:DARK}}>{c.name}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{c.orders} 次訂購</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:14,fontWeight:500,color:RED}}>R{c.total}</div>
              <div style={{fontSize:11,color:"#aaa"}}>平均 R{Math.round(c.total/c.orders)}/次</div>
            </div>
          </div>
        ))}
      </div>}

      {/* 每日分析 */}
      {aFilter==="day"&&<div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:500,color:NAVY,marginBottom:8}}>📈 每日銷售 Daily Sales</div>

        {dayList.map(d=>(

            <div style={{fontSize:14,fontWeight:500,color:RED}}>R{d.total}</div>

        ))}

  );
}

            <div style={{fontSize:13,fontWeight:500,color:"#7A5800",marginBottom:8}}>🎉 加價購 Add-on</div>
            {addonList.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div><span style={{fontSize:13,color:DARK}}>{p.addonName}</span><span style={{fontSize:12,color:"#A07000",marginLeft:6}}>+R{p.addonPrice}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {(addonQty[p.id]||0)>0&&<><button onClick={()=>adjA(p.id,-1)} style={{width:28,height:28,borderRadius:14,border:"1.5px solid #F0C040",background:"#fff",color:"#7A5800",fontSize:18,cursor:"pointer",lineHeight:1}}>−</button><span style={{fontSize:14,fontWeight:500,minWidth:16,textAlign:"center"}}>{addonQty[p.id]}</span></>}
                  <button onClick={()=>adjA(p.id,1)} style={{width:28,height:28,borderRadius:14,border:"1.5px solid #F0C040",background:(addonQty[p.id]||0)>0?"#F0C040":"#fff",color:(addonQty[p.id]||0)>0?"#fff":"#7A5800",fontSize:18,cursor:"pointer",lineHeight:1}}>+</button>
                </div>
              </div>
            ))}
          </div>}
          {cartItems.length>0&&<div style={{background:"#fff",border:`1.5px solid ${RED}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:13,color:RED,fontWeight:500,marginBottom:4}}>已選 {cartItems.length} 項 · 小計 R{sub}{disc>0?` → 折後 R${total}`:""}</div>
            {belowMin&&<div style={{fontSize:12,color:"#E67E22",marginTop:4}}>⚠️ 最低消費 R{minOrder}，還差 R{minOrder-sub}</div>}
          </div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep(1)} style={{padding:"12px 18px",borderRadius:8,border:`1.5px solid ${BORDER}`,background:"#fff",color:DARK,fontSize:13,cursor:"pointer"}}>← 返回 Back</button>
            <button onClick={()=>setStep(3)} disabled={cartItems.length===0||belowMin} style={{background:(cartItems.length===0||belowMin)?"#ccc":RED,color:"#fff",border:"none",borderRadius:8,padding:"12px 24px",fontSize:14,fontWeight:500,cursor:(cartItems.length===0||belowMin)?"not-allowed":"pointer",marginTop:8}}>下一步 Next →</button>
          </div>
        </div>}

        {step===3&&<div>
          <div style={{fontSize:16,fontWeight:500,marginBottom:16}}>取餐與付款 Pickup & Payment</div>
          <Lbl t="取餐方式 Pickup Method"/>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <SBtn label="外帶 Takeaway" active={pickup==="外帶"} onClick={()=>setPickup("外帶")}/>
            <SBtn label="外送 Delivery" active={pickup==="外送"} onClick={()=>setPickup("外送")}/>
            <SBtn label="內用 Dine-in" active={pickup==="內用"} onClick={()=>setPickup("內用")}/>
          </div>
          {pickup==="外送"&&<>
            <div style={{background:"#FFF8F0",border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 12px",marginTop:10,fontSize:12,color:"#7A4A00",lineHeight:1.7}}>
              🛵 免費外送 Free Delivery：金額滿R1500且距離5KM內<br/>
              <span style={{color:"#999"}}>Free delivery for orders ≥R1500 within 5km radius</span>
              {totalBeforeDelivFee>0&&totalBeforeDelivFee<1500&&<><br/><span style={{color:RED}}>💰 還差 R{Math.max(0, 1500-totalBeforeDelivFee)} 就符合免費外送</span></>}
              {totalBeforeDelivFee>=1500&&distNum>5&&<><br/><span style={{color:RED}}>📍 距離超過5KM，需付外送費 R{delivFee}</span></>}
              {isFreeDelivery&&<><br/><span style={{color:"#27AE60"}}>✓ 符合免費外送！Eligible for free delivery!</span></>}
              {!isFreeDelivery&&delivFee>0&&<><br/><span style={{color:"#555"}}>外送費 Delivery fee：R{delivFee}</span></>}
            </div>
            <Lbl t="外送地址 Delivery Address"/><input type="text" defaultValue={adRef.current} onChange={e=>{adRef.current=e.target.value;}} placeholder="請輸入地址 Enter address" style={IS}/>
            <Lbl t="距離 Distance (KM)"/><input type="number" step="0.1" value={distance} onChange={e=>setDistance(e.target.value)} placeholder="例如：3.5" style={IS}/>
          </>}
          <Lbl t={pickup==="內用"?"預計用餐日期 Dining Date":"預計取餐日期 Pickup Date"}/>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginTop:6}}>
            {dates.map(d=>{const active=selDate&&fmtKey(d)===fmtKey(selDate);return(
              <button key={fmtKey(d)} onClick={()=>{setSelDate(d);setTime("");}} style={{flexShrink:0,padding:"8px 12px",borderRadius:8,border:`2px solid ${active?RED:BORDER}`,background:active?"#FDF0EE":"#fff",color:active?RED:DARK,fontSize:11,cursor:"pointer",lineHeight:1.4}}>{isToday(d)?"今天 Today":fmtDate(d)}</button>
            );})}
          </div>
          {selDate&&<><Lbl t={pickup==="內用"?"預計用餐時間 Dining Time":"預計取餐時間 Pickup Time"}/><select value={time} onChange={e=>setTime(e.target.value)} style={{...IS,color:time?DARK:"#999",fontSize:14}}><option value="">請選擇時間 Select time</option>{slots.map(t=><option key={t} value={t}>{t}</option>)}</select></>}
          <Lbl t="付款方式 Payment Method"/>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <SBtn label="現金 Cash" active={pay==="現金"} onClick={()=>setPay("現金")}/>
            <SBtn label="EFT" active={pay==="EFT"} onClick={()=>setPay("EFT")}/>
            <SBtn label="餐券 Voucher" active={pay==="餐券"} onClick={()=>setPay("餐券")}/>
          </div>
          {pay==="EFT"&&<div style={{background:"#F0F7FF",border:"1.5px solid #B5D4F4",borderRadius:10,padding:"12px 14px",marginTop:10}}>
            <div style={{fontSize:13,fontWeight:500,color:"#0C447C",marginBottom:8}}>🏦 EFT Banking Details</div>
            {[["Bank","Capitec Bank"],["Acc Name","Intelage Trading cc"],["Acc No","1055134590"],["Branch Code","450105"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:"#555"}}>{k}</span><span style={{fontSize:13,fontWeight:500,color:"#0C447C"}}>{v}</span></div>
            ))}
            <div style={{fontSize:11,color:"#888",marginTop:8,borderTop:"1px solid #B5D4F4",paddingTop:8}}>請以姓名作為付款參考 Use your name as reference</div>
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #B5D4F4"}}>
              <div style={{fontSize:12,fontWeight:500,color:"#0C447C",marginBottom:8}}>📸 付款後上傳證明 Upload Proof of Payment</div>
              <input 
                type="text" 
                value={eftProof}
                onChange={e=>setEftProof(e.target.value)}
                placeholder="貼上證明圖片連結或描述 Paste proof image URL or describe" 
                style={{...IS,fontSize:13}}
              />
              <div style={{fontSize:11,color:"#888",marginTop:6}}>⚠️ 上傳付款證明後才能出餐 Food will be prepared after proof is submitted</div>
            </div>
          </div>}
          <Lbl t="備註 Remarks（選填 Optional）"/><textarea defaultValue={noRef.current} onChange={e=>{noRef.current=e.target.value;}} placeholder="例：不要辣、少油... e.g. No spicy" style={{...IS,minHeight:68,resize:"vertical"}}/>
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>setStep(2)} style={{padding:"12px 18px",borderRadius:8,border:`1.5px solid ${BORDER}`,background:"#fff",color:DARK,fontSize:13,cursor:"pointer"}}>← 返回 Back</button>
            <button onClick={go4} style={{background:RED,color:"#fff",border:"none",borderRadius:8,padding:"12px 24px",fontSize:14,fontWeight:500,cursor:"pointer",marginTop:8}}>確認訂單 Confirm →</button>
          </div>
        </div>}

        {step===4&&<div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:500}}>訂單確認 Order Summary</div>
            <div style={{background:RED,color:"#fff",borderRadius:6,padding:"3px 10px",fontSize:13,fontWeight:500}}>#{ordNo}</div>
          </div>
          <div style={{background:"#fff",border:`1.5px solid ${BORDER}`,borderRadius:12,padding:"16px 14px",marginBottom:16}}>
            <Row label="顧客 Customer" val={`${nameVal}${phoneVal?` · ${phoneVal}`:""}`}/>
            <Row label="取餐 Pickup" val={`${pickLbl()}${pickup==="外送"&&addr?`：${addr}`:""}`}/>
            {pickup==="外送"&&distance&&<Row label="距離 Distance" val={`${distance} km`}/>}
            {selDate&&<Row label="日期 Date" val={isToday(selDate)?"今天 Today":fmtDate(selDate)}/>}
            {time&&<Row label="時間 Time" val={time}/>}
            <Row label="付款 Payment" val={payLbl()}/>
            {pay==="EFT"&&eftProof&&<Row label="付款證明 Proof" val={eftProof}/>}
            <div style={{borderTop:`1px solid ${BORDER}`,paddingTop:12,marginTop:4}}>
              {cartItems.map(i=>(
                <div key={i.id} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13}}>{i.name} <span style={{color:"#999",fontSize:11}}>{i.nameEn}</span> × {qty(i.id)}</span>
                  <span style={{fontSize:13}}>R{i.price*qty(i.id)}</span>
                </div>
              ))}
              {addonList.filter(p=>(addonQty[p.id]||0)>0).map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,color:"#7A5800"}}>＋{p.addonName} × {addonQty[p.id]}</span>
                  <span style={{fontSize:13,color:"#7A5800"}}>+R{p.addonPrice*addonQty[p.id]}</span>
                </div>
              ))}
              {discLines.map((l,i)=><div key={i} style={{fontSize:12,color:"#27AE60",marginBottom:4}}>{l}</div>)}
              {fee>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#888"}}>外送費</span><span style={{fontSize:13}}>+R{fee}</span></div>}
              {isFreeDelivery&&pickup==="外送"&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,color:"#27AE60"}}><span style={{fontSize:12}}>✨ 免費外送</span><span style={{fontSize:13,fontWeight:500}}>-R0</span></div>}
              <div style={{borderTop:`1px solid ${BORDER}`,marginTop:8,paddingTop:8}}>
                {disc>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"#888"}}>小計</span><span style={{fontSize:13,color:"#888",textDecoration:"line-through"}}>R{sub}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:15,fontWeight:500}}>合計 Total</span><span style={{fontSize:16,fontWeight:500,color:RED}}>R{total}</span></div>
              </div>
            </div>
            {note&&<div style={{marginTop:10,fontSize:12,color:"#666",borderTop:`1px solid ${BORDER}`,paddingTop:8}}>備註：{note}</div>}
          </div>
          <div style={{background:"#F5F5F5",borderRadius:10,padding:"12px 14px",marginBottom:14,fontFamily:"monospace",fontSize:12,whiteSpace:"pre-wrap",color:DARK,lineHeight:1.7}}>{orderTxt()}</div>
          <button onClick={sendWA} style={{width:"100%",padding:"13px",borderRadius:8,border:"none",background:"#25D366",color:"#fff",fontSize:14,fontWeight:500,cursor:"pointer",marginBottom:10}}>📲 {isInWeChat()?"複製訂單到 WhatsApp Copy to WhatsApp":"傳送到 WhatsApp Send via WhatsApp"}</button>
          <button onClick={copy} style={{width:"100%",padding:"12px",borderRadius:8,border:`2px solid ${copied?"#27AE60":RED}`,background:copied?"#27AE60":"#fff",color:copied?"#fff":RED,fontSize:13,fontWeight:500,cursor:"pointer",marginBottom:10}}>{copied?"✓ 已複製！Copied!":"複製訂單文字 Copy Text"}</button>
          <button onClick={reset} style={{width:"100%",padding:"12px",borderRadius:8,border:`1.5px solid ${BORDER}`,background:"#fff",color:"#888",fontSize:13,cursor:"pointer"}}>+ 新增訂單 New Order</button>
        </div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
